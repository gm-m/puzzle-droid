<div class="settings-container">
  <div class="settings-header">
    <h2>Impostazioni App</h2>
    <p>Tema globale, scacchiera e set pezzi</p>
  </div>

  <div class="settings-content">
    <div class="setting-group checkbox-group">
      <label class="setting-label" for="dark-mode">Dark mode globale</label>
      <label class="switch">
        <input id="dark-mode" type="checkbox" [checked]="settings().darkMode" (change)="onDarkModeChange($event)">
        <span class="slider round"></span>
      </label>
    </div>

    <div class="setting-group">
      <label class="setting-label" for="board-theme">Tema Scacchiera</label>
      <select id="board-theme" class="setting-select" [value]="settings().boardTheme" (change)="onThemeChange($event)">
        <option value="brown">Marrone Classico</option>
        <option value="blue">Blu Scuro</option>
        <option value="green">Verde Scacchistico</option>
        <option value="grey">Grigio Minimal</option>
      </select>
    </div>

    <div class="setting-group">
      <label class="setting-label" for="piece-set">Set Pezzi</label>
      <select id="piece-set" class="setting-select" [value]="settings().pieceSet" (change)="onPieceSetChange($event)">
        <option value="cburnett">Cburnett</option>
        <option value="merida">Merida</option>
        <option value="alpha">Alpha</option>
        <option value="kosal">Kosal</option>
      </select>
    </div>

    <div class="setting-group checkbox-group">
      <label class="setting-label" for="board-3d">Stile 3D</label>
      <label class="switch">
        <input id="board-3d" type="checkbox" [checked]="settings().is3d" (change)="on3dChange($event)">
        <span class="slider round"></span>
      </label>
    </div>

    <div class="setting-group checkbox-group">
      <label class="setting-label" for="show-coords">Mostra Coordinate</label>
      <label class="switch">
        <input id="show-coords" type="checkbox" [checked]="settings().showCoordinates" (change)="onCoordinatesChange($event)">
        <span class="slider round"></span>
      </label>
    </div>

    <div class="setting-group checkbox-group">
      <label class="setting-label" for="highlight-move">Evidenzia Ultima Mossa</label>
      <label class="switch">
        <input id="highlight-move" type="checkbox" [checked]="settings().highlightLastMove" (change)="onHighlightChange($event)">
        <span class="slider round"></span>
      </label>
    </div>
    
    <div class="settings-actions">
      <button type="button" class="btn-reset" (click)="resetSettings()">Ripristina Predefinite</button>
    </div>

    <div class="backup-card">
      <h3>Backup e Restore</h3>
      <p>Esporta/importa libreria, sessioni Woodpecker, analytics e impostazioni.</p>

      <div class="backup-actions">
        <button type="button" class="btn-backup" (click)="exportBackup()">Esporta backup JSON</button>
        <label class="btn-import">
          Importa backup JSON
          <input type="file" accept="application/json,.json" (change)="onBackupFileSelected($event)" />
        </label>
      </div>

      <p class="backup-feedback" *ngIf="backupFeedback">{{ backupFeedback }}</p>
    </div>
  </div>
</div>
