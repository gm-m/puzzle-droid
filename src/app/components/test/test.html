<main class="poc-shell">
  <section class="board-section">
    <app-eval-bar [score]="primaryScore()" [hidden]="!showEvalBar()"></app-eval-bar>

    <app-chess-board
      class="board-host"
      [fen]="currentFen()"
      [turnColor]="turnColor()"
      [legalDests]="legalDests()"
      (moved)="onBoardMove($event)"
    ></app-chess-board>
  </section>

  <app-analysis-panel
    [isAnalyzing]="isAnalyzing()"
    [bestMove]="bestMove()"
    [evalLabel]="evalLabel()"
    [fen]="currentFen()"
    [depth]="depth()"
    [multiPv]="multiPv()"
    [showEvalBar]="showEvalBar()"
    [lines]="lines()"
    [canGoBack]="canGoBack()"
    [canGoForward]="canGoForward()"
    [moveCursorLabel]="moveCursorLabel()"
    (analyze)="analyzePosition()"
    (reset)="resetBoard()"
    (depthChanged)="onDepthChange($event)"
    (multiPvChanged)="onMultiPvChange($event)"
    (toggleEvalBar)="toggleEvalBar()"
    (previousMove)="previousMove()"
    (nextMove)="nextMove()"
    (lineSelected)="onLineSelected($event)"
  ></app-analysis-panel>
</main>
