<main class="layout-shell">
  <header class="app-topbar">
    <div class="topbar-main">
      <button type="button" class="menu-trigger" aria-label="Apri menu" (click)="toggleMenu()">☰</button>
      <!-- <div class="topbar-title-wrap">
        <p class="topbar-kicker">Vista</p>
        <h1>{{ currentViewTitle() }}</h1>
      </div> -->
    </div>
    <!-- <p class="topbar-engine" [class.off]="isEngineHidden()">{{ topBarEngineStatus() }}</p> -->
  </header>

  <aside class="side-menu" [class.open]="isMenuOpen()">
    <h2>Navigazione</h2>

    <button
      type="button"
      class="menu-item"
      [class.active]="activeView() === 'analysis'"
      (click)="setActiveView('analysis')"
    >
      Analisi
    </button>

    <button
      type="button"
      class="menu-item"
      [class.active]="activeView() === 'library'"
      (click)="setActiveView('library')"
    >
      Libreria
    </button>
    
    <button
      type="button"
      class="menu-item"
      [class.active]="activeView() === 'settings'"
      (click)="setActiveView('settings')"
    >
      Impostazioni
    </button>
  </aside>

  <div class="content-area" (touchstart)="onContentTouchStart($event)" (touchend)="onContentTouchEnd($event)" (touchcancel)="onContentTouchCancel()">
    <ng-container *ngIf="activeView() === 'analysis'">
      <section class="poc-shell">
        <app-analysis-panel
          class="analysis-panel-mobile-engine"
          [isAnalyzing]="isAnalyzing()"
          [bestMove]="bestMove()"
          [evalLabel]="evalLabel()"
          [fen]="currentFen()"
          [fenInputValue]="currentFen()"
          [fenFeedback]="fenFeedback()"
          [depth]="depth()"
          [multiPv]="multiPv()"
          [skillLevel]="skillLevel()"
          [showEvalBar]="showEvalBar()"
          [lines]="lines()"
          [libraryGameTitle]="currentLibraryGameTitle()"
          [canGoBack]="canGoBack()"
          [canGoForward]="canGoForward()"
          [canGoPreviousGame]="canGoToPreviousLibraryGame()"
          [canGoNextGame]="canGoToNextLibraryGame()"
          [showMoveList]="showMoveList()"
          [moveListMaxHeight]="boardPixelSize()"
          [moveCursorLabel]="moveCursorLabel()"
          [moves]="moveHistory()"
          [moveCursor]="moveCursor()"
          [hideEngine]="isEngineHidden()"
          [puzzleMessage]="puzzleMessage()"
          [showSurrender]="showSurrenderButton()"
          [showWoodpeckerInfo]="showWoodpeckerInfo()"
          [woodpeckerCycleLabel]="woodpeckerCycleLabel()"
          [woodpeckerProgressLabel]="woodpeckerProgressLabel()"
          [woodpeckerTargetLabel]="woodpeckerTargetLabel()"
          [woodpeckerDayLabel]="woodpeckerDayLabel()"
          [woodpeckerCalendarLabel]="woodpeckerCalendarLabel()"
          [woodpeckerProgressPercent]="woodpeckerProgressPercent()"
          [boardOrientation]="boardOrientation()"
          [turnColor]="turnColor()"
          [showBestMoveArrow]="showBestMoveArrow()"
          [showLibraryGameNavigation]="showLibraryGameNavigation()"
          [showEngineArea]="true"
          [showMoveArea]="false"
          (analyze)="analyzePosition()"
          (reset)="resetBoard()"
          (fenApplied)="applyFen($event)"
          (depthChanged)="onDepthChange($event)"
          (multiPvChanged)="onMultiPvChange($event)"
          (skillLevelChanged)="onSkillLevelChange($event)"
          (toggleEvalBar)="toggleEvalBar()"
          (rotateBoard)="rotateBoard()"
          (bestMoveArrowToggled)="onBestMoveArrowToggled($event)"
          (firstMove)="firstMove()"
          (previousMove)="previousMove()"
          (nextMove)="nextMove()"
          (lastMove)="lastMove()"
          (previousGame)="previousLibraryGame()"
          (nextGame)="nextLibraryGame()"
          (moveJumpRequested)="onMoveJumpRequested($event)"
          (lineSelected)="onLineSelected($event)"
          (surrenderPuzzle)="onPuzzleSurrender()"
        ></app-analysis-panel>

        <section class="board-section">
          <app-eval-bar [score]="primaryScore()" [hidden]="!showEvalBar() || isEngineHidden()"></app-eval-bar>

          <app-chess-board
            #boardHostRef
            class="board-host"
            [fen]="currentFen()"
            [turnColor]="turnColor()"
            [legalDests]="legalDests()"
            [orientation]="boardOrientation()"
            [bestMoveArrow]="bestMoveArrow()"
            [showCoordinates]="settings().showCoordinates"
            [boardTheme]="settings().boardTheme"
            [pieceSet]="settings().pieceSet"
            [highlightLastMove]="settings().highlightLastMove"
            (moved)="onBoardMove($event)"
          ></app-chess-board>
        </section>

        <app-analysis-panel
          class="analysis-panel-desktop"
          [isAnalyzing]="isAnalyzing()"
          [bestMove]="bestMove()"
          [evalLabel]="evalLabel()"
          [fen]="currentFen()"
          [fenInputValue]="currentFen()"
          [fenFeedback]="fenFeedback()"
          [depth]="depth()"
          [multiPv]="multiPv()"
          [skillLevel]="skillLevel()"
          [showEvalBar]="showEvalBar()"
          [lines]="lines()"
          [libraryGameTitle]="currentLibraryGameTitle()"
          [canGoBack]="canGoBack()"
          [canGoForward]="canGoForward()"
          [canGoPreviousGame]="canGoToPreviousLibraryGame()"
          [canGoNextGame]="canGoToNextLibraryGame()"
          [showMoveList]="showMoveList()"
          [moveListMaxHeight]="boardPixelSize()"
          [moveCursorLabel]="moveCursorLabel()"
          [moves]="moveHistory()"
          [moveCursor]="moveCursor()"
          [hideEngine]="isEngineHidden()"
          [puzzleMessage]="puzzleMessage()"
          [showSurrender]="showSurrenderButton()"
          [showWoodpeckerInfo]="showWoodpeckerInfo()"
          [woodpeckerCycleLabel]="woodpeckerCycleLabel()"
          [woodpeckerProgressLabel]="woodpeckerProgressLabel()"
          [woodpeckerTargetLabel]="woodpeckerTargetLabel()"
          [woodpeckerDayLabel]="woodpeckerDayLabel()"
          [woodpeckerCalendarLabel]="woodpeckerCalendarLabel()"
          [woodpeckerProgressPercent]="woodpeckerProgressPercent()"
          [boardOrientation]="boardOrientation()"
          [turnColor]="turnColor()"
          [showBestMoveArrow]="showBestMoveArrow()"
          [showLibraryGameNavigation]="showLibraryGameNavigation()"
          [showEngineArea]="true"
          [showMoveArea]="true"
          (analyze)="analyzePosition()"
          (reset)="resetBoard()"
          (fenApplied)="applyFen($event)"
          (depthChanged)="onDepthChange($event)"
          (multiPvChanged)="onMultiPvChange($event)"
          (skillLevelChanged)="onSkillLevelChange($event)"
          (toggleEvalBar)="toggleEvalBar()"
          (rotateBoard)="rotateBoard()"
          (bestMoveArrowToggled)="onBestMoveArrowToggled($event)"
          (firstMove)="firstMove()"
          (previousMove)="previousMove()"
          (nextMove)="nextMove()"
          (lastMove)="lastMove()"
          (previousGame)="previousLibraryGame()"
          (nextGame)="nextLibraryGame()"
          (moveJumpRequested)="onMoveJumpRequested($event)"
          (lineSelected)="onLineSelected($event)"
          (surrenderPuzzle)="onPuzzleSurrender()"
        ></app-analysis-panel>

        <app-analysis-panel
          class="analysis-panel-mobile-moves"
          [isAnalyzing]="isAnalyzing()"
          [bestMove]="bestMove()"
          [evalLabel]="evalLabel()"
          [fen]="currentFen()"
          [fenInputValue]="currentFen()"
          [fenFeedback]="fenFeedback()"
          [depth]="depth()"
          [multiPv]="multiPv()"
          [skillLevel]="skillLevel()"
          [showEvalBar]="showEvalBar()"
          [lines]="lines()"
          [libraryGameTitle]="currentLibraryGameTitle()"
          [canGoBack]="canGoBack()"
          [canGoForward]="canGoForward()"
          [canGoPreviousGame]="canGoToPreviousLibraryGame()"
          [canGoNextGame]="canGoToNextLibraryGame()"
          [showMoveList]="showMoveList()"
          [moveListMaxHeight]="boardPixelSize()"
          [moveCursorLabel]="moveCursorLabel()"
          [moves]="moveHistory()"
          [moveCursor]="moveCursor()"
          [hideEngine]="isEngineHidden()"
          [puzzleMessage]="puzzleMessage()"
          [showSurrender]="showSurrenderButton()"
          [showWoodpeckerInfo]="showWoodpeckerInfo()"
          [woodpeckerCycleLabel]="woodpeckerCycleLabel()"
          [woodpeckerProgressLabel]="woodpeckerProgressLabel()"
          [woodpeckerTargetLabel]="woodpeckerTargetLabel()"
          [woodpeckerDayLabel]="woodpeckerDayLabel()"
          [woodpeckerCalendarLabel]="woodpeckerCalendarLabel()"
          [woodpeckerProgressPercent]="woodpeckerProgressPercent()"
          [boardOrientation]="boardOrientation()"
          [turnColor]="turnColor()"
          [showBestMoveArrow]="showBestMoveArrow()"
          [showLibraryGameNavigation]="showLibraryGameNavigation()"
          [showEngineArea]="false"
          [showMoveArea]="true"
          (analyze)="analyzePosition()"
          (reset)="resetBoard()"
          (fenApplied)="applyFen($event)"
          (depthChanged)="onDepthChange($event)"
          (multiPvChanged)="onMultiPvChange($event)"
          (skillLevelChanged)="onSkillLevelChange($event)"
          (toggleEvalBar)="toggleEvalBar()"
          (rotateBoard)="rotateBoard()"
          (bestMoveArrowToggled)="onBestMoveArrowToggled($event)"
          (firstMove)="firstMove()"
          (previousMove)="previousMove()"
          (nextMove)="nextMove()"
          (lastMove)="lastMove()"
          (previousGame)="previousLibraryGame()"
          (nextGame)="nextLibraryGame()"
          (moveJumpRequested)="onMoveJumpRequested($event)"
          (lineSelected)="onLineSelected($event)"
          (surrenderPuzzle)="onPuzzleSurrender()"
        ></app-analysis-panel>
      </section>
    </ng-container>

    <ng-container *ngIf="activeView() === 'library'">
      <app-library-panel
        [items]="libraryItems()"
        (filesSelected)="onLibraryFilesSelected($event)"
        (modeChanged)="onLibraryModeChanged($event)"
        (gameSelected)="onLibraryGameSelected($event)"
        (itemRemoved)="onLibraryItemRemoved($event)"
        (dashboardRequested)="onLibraryDashboardRequested($event)"
      ></app-library-panel>
    </ng-container>

    <ng-container *ngIf="activeView() === 'settings'">
      <app-settings-panel></app-settings-panel>
    </ng-container>
  </div>

  <button
    *ngIf="isLibraryGamePickerOpen()"
    type="button"
    class="library-picker-backdrop"
    aria-label="Chiudi elenco partite"
    (click)="closeLibraryGamePicker()"
  ></button>

  <aside class="library-picker-drawer" [class.open]="isLibraryGamePickerOpen()" aria-label="Elenco partite libreria">
    <header class="library-picker-header">
      <h2>{{ currentLibraryItemName() || 'Elenco partite' }}</h2>
      <button type="button" class="library-picker-close" aria-label="Chiudi" (click)="closeLibraryGamePicker()">✕</button>
    </header>

    <label class="library-picker-filter" for="library-game-filter">
      Filtra per titolo
      <input
        id="library-game-filter"
        type="text"
        [value]="libraryGameFilter()"
        placeholder="Es. Carlsen, Partita 12, 1-0"
        (input)="onLibraryGameFilterInput($event)"
      />
    </label>

    <ng-container *ngIf="libraryGamePickerEntries() as entries">
      <div class="library-picker-list" *ngIf="entries.length > 0; else noFilteredGames">
        <button
          type="button"
          class="library-picker-entry"
          *ngFor="let entry of entries"
          [class.active]="isCurrentLibraryGame(entry.id)"
          [disabled]="isPuzzleAutoPlaying()"
          (click)="selectLibraryGameFromPicker(entry.id)"
        >
          {{ entry.title }}
        </button>
      </div>
    </ng-container>

    <ng-template #noFilteredGames>
      <p class="library-picker-empty">Nessuna partita trovata con questo filtro.</p>
    </ng-template>
  </aside>

  <button
    *ngIf="isMenuOpen()"
    type="button"
    class="menu-backdrop"
    aria-label="Close menu"
    (click)="toggleMenu()"
  ></button>
</main>
