<main class="poc-shell">
  <section class="board-section">
    <div #boardHost class="board"></div>
  </section>

  <aside class="analysis-panel">
    <h1>Chessground + Stockfish POC</h1>

    <div class="stats">
      <p><strong>Best move:</strong> {{ bestMove() }}</p>
      <p><strong>Eval:</strong> {{ evaluation() }}</p>
      <p><strong>Status:</strong> {{ isAnalyzing() ? 'Analyzing...' : 'Ready' }}</p>
      <p class="fen"><strong>FEN:</strong> {{ currentFen() }}</p>
    </div>

    <div class="actions">
      <button type="button" (click)="analyzePosition()">Analyze</button>
      <button type="button" (click)="resetBoard()">Reset</button>
    </div>
  </aside>
</main>
