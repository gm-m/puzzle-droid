<aside class="analysis-panel">
  <h1>Chessground + Stockfish POC</h1>

  <div class="stats">
    <p><strong>Best move:</strong> {{ bestMove }}</p>
    <p><strong>Eval:</strong> {{ evalLabel }}</p>
    <p><strong>Status:</strong> {{ isAnalyzing ? 'Analyzing...' : 'Ready' }}</p>
    <p class="fen"><strong>FEN:</strong> {{ fen }}</p>
  </div>

  <div class="engine-config">
    <label>
      Depth
      <input type="number" min="1" max="30" [value]="depth" (input)="onDepthInput($event)" />
    </label>

    <label>
      Multiple lines
      <input type="number" min="1" max="5" [value]="multiPv" (input)="onMultiPvInput($event)" />
    </label>

    <button type="button" class="toggle" (click)="toggleEvalBar.emit()">
      {{ showEvalBar ? 'Nascondi eval bar' : 'Mostra eval bar' }}
    </button>
  </div>

  <form class="fen-controls" (submit)="onFenSubmit($event, fenInput.value)">
    <label>
      Posizione iniziale (FEN)
      <input #fenInput type="text" [placeholder]="fenInputValue || 'Inserisci FEN'" />
    </label>
    <button type="submit">Applica FEN</button>
    <p *ngIf="fenFeedback" class="fen-feedback">{{ fenFeedback }}</p>
  </form>

  <div class="actions">
    <button type="button" (click)="analyze.emit()">Analyze</button>
    <button type="button" (click)="reset.emit()">Reset</button>
  </div>

  <div class="history-nav">
    <button type="button" [disabled]="!canGoBack" (click)="previousMove.emit()">Previous</button>
    <span class="cursor">{{ moveCursorLabel }}</span>
    <button type="button" [disabled]="!canGoForward" (click)="nextMove.emit()">Next</button>
  </div>

  <section class="pv-list">
    <h2>Engine lines</h2>
    <p *ngIf="lines.length === 0">Nessuna variante disponibile.</p>
    <ol *ngIf="lines.length > 0">
      <li *ngFor="let line of lines">
        <p class="line-header">{{ lineHeader(line) }}</p>
        <div class="line-moves">
          <button
            *ngFor="let move of line.pv; let moveIndex = index"
            type="button"
            class="line-button"
            (click)="selectLineMove(line, moveIndex)"
          >
            {{ move }}
          </button>
        </div>
      </li>
    </ol>
  </section>
</aside>
